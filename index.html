<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Smart Civic AI</title><link rel="stylesheet" href="style.css"></head>
<body>
<div class="card">
<h1>Smart Civic AI</h1>
<p>AI-powered civic complaint prototype</p>
<input id="title" placeholder="Complaint title">
<textarea id="desc" placeholder="Describe the issue"></textarea>
<div class="row">
<button id="mic">🎤 Speak</button>
<input type="file" id="photo" accept="image/*">
</div>
<button id="loc">📍 Get Location</button>
<p id="coords">Location: Not captured</p>
<button id="submit">🚀 Submit Complaint</button>
<pre id="status"></pre>
<h3>Municipal Operations Dashboard (Prototype)</h3>
<div id="dashboard">No complaints yet.</div>
</div>
<script src="script.js"></script>
</body></html>
